---
name: Deploy Website

on:
  push:
    paths:
      - '.github/workflows/web.yaml'
      - 'web/**'
      - 'kuba.schema.json'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment,
# skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want
# to allow these production deployments to complete.
concurrency:
  group: 'deploy'
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-linux:
    name: Deploy website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - name: Cache Vite-Plus dependencies
        uses: actions/cache@v5.0.4
        with:
          path: ~/.vite-plus
          key: web-vite-plus-${{ hashFiles('**/pnpn-lock.yaml') }}
          restore-keys: |
            web-vite-plus-${{ hashFiles('**/pnpn-lock.yaml') }}
      - name: Install dependencies
        run: vp install
      - name: Add kuba.schema.json to website
        run: cp kuba.schema.json web/static/kuba.schema.json
      - name: Add kuba-global.schema.json to website
        run: cp kuba-global.schema.json web/static/kuba-global.schema.json
      - name: Install dependencies
        run: cd web && vp install
      - name: Create Website
        run: cd web && vp run build
      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: 'web/build'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
