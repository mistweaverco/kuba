---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
      - name: Install dependencies
        run: vp install
      - name: Set up env
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Generate changelog
        run: vp run changelog
      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: changelog
          path: internal/changelog/changelog.md
          if-no-files-found: error
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up env
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TARGET_PLATFORM=linux" >> $GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: 1.25
      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Download changelog artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: changelog
          path: internal/changelog/changelog.md
      - name: Build for Linux
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: ./scripts/build.sh
      - name: Verify Linux binary
        run: ./dist/kuba-linux-amd64 --version
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kuba-linux-amd64
          path: dist/kuba-linux-amd64
          if-no-files-found: error
  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up env
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TARGET_PLATFORM=macos" >> $GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: 1.25
      - name: Download changelog artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: changelog
          path: internal/changelog/changelog.md
      - name: Build for macOS
        env:
          CGO_ENABLED: 1
        run: ./scripts/build.sh
      - name: Install the Apple certificate, provisioning profile, and API key
        id: keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_BUILD_PROVISION_PROFILE_BASE64 }}
          AUTH_KEY_BASE64: ${{ secrets.APPLE_AUTH_KEY_BASE64 }}
        run: ./scripts/ci-import-apple-certs.sh
      - name: Sign the amd64 binary
        env:
          CODESIGNING_IDENTITY: ${{ secrets.APPLE_CODESIGNING_IDENTITY }}
          CODESIGNING_PREFIX: ${{ secrets.APPLE_CODESIGNING_PREFIX }}
        run: |
          export CODESIGNING_IDENTITY=$(base64 --decode <<< "$CODESIGNING_IDENTITY")
          export CODESIGNING_PREFIX=$(base64 --decode <<< "$CODESIGNING_PREFIX")
          codesign --sign "$CODESIGNING_IDENTITY" \
            --prefix "$CODESIGNING_PREFIX" \
            --options runtime dist/kuba-darwin-amd64
      - name: Sign the arm64 binary
        env:
          CODESIGNING_IDENTITY: ${{ secrets.APPLE_CODESIGNING_IDENTITY }}
          CODESIGNING_PREFIX: ${{ secrets.APPLE_CODESIGNING_PREFIX }}
        run: |
          export CODESIGNING_IDENTITY=$(base64 --decode <<< "$CODESIGNING_IDENTITY")
          export CODESIGNING_PREFIX=$(base64 --decode <<< "$CODESIGNING_PREFIX")
          codesign --sign "$CODESIGNING_IDENTITY" \
            --prefix "$CODESIGNING_PREFIX" \
            --options runtime dist/kuba-darwin-arm64
      - name: Zip the amd64 binary for notarization
        run: zip -r dist/kuba-darwin-amd64.zip dist/kuba-darwin-amd64
      - name: Zip the arm64 binary for notarization
        run: zip -r dist/kuba-darwin-arm64.zip dist/kuba-darwin-arm64
      - name: Upload the amd64 binary for notarization
        env:
          KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_ISSUER }}
        run: |
          export KEY_ID=$(base64 --decode <<< "$KEY_ID")
          export ISSUER=$(base64 --decode <<< "$ISSUER")
          xcrun notarytool submit dist/kuba-darwin-amd64.zip \
            --key "${{ steps.keychain.outputs.auth_key_path }}" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait
      - name: Upload the arm64 binary for notarization
        env:
          KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_ISSUER }}
        run: |
          export KEY_ID=$(base64 --decode <<< "$KEY_ID")
          export ISSUER=$(base64 --decode <<< "$ISSUER")
          xcrun notarytool submit dist/kuba-darwin-arm64.zip \
            --key "${{ steps.keychain.outputs.auth_key_path }}" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait
      - name: Verify macOS binaries
        run: |
          ./dist/kuba-darwin-amd64 --version
          ./dist/kuba-darwin-arm64 --version
      - name: Upload macOS amd64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kuba-darwin-amd64
          path: dist/kuba-darwin-amd64
          if-no-files-found: error
      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kuba-darwin-arm64
          path: dist/kuba-darwin-arm64
          if-no-files-found: error
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up env
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart('v')
          "VERSION=$version" >> $env:GITHUB_ENV
          "TARGET_PLATFORM=windows" >> $env:GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: 1.25
      - name: Install MinGW
        run: choco install mingw -y
      - name: Use MSVC for cgo
        shell: pwsh
        run: |
          "CC=gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CGO_ENABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Download changelog artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: changelog
          path: internal/changelog/changelog.md
      - name: Build for Windows
        shell: bash
        run: ./scripts/build.sh
      - name: Verify Windows binary
        shell: pwsh
        run: .\dist\kuba-windows-amd64.exe --version
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kuba-windows-amd64-exe
          path: dist/kuba-windows-amd64.exe
          if-no-files-found: error
  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up env
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Download Linux artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: kuba-linux-amd64
          path: dist
      - name: Download macOS amd64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: kuba-darwin-amd64
          path: dist
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: kuba-darwin-arm64
          path: dist
      - name: Download Windows artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: kuba-windows-amd64-exe
          path: dist
      - name: Publish release with all artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/release.sh
  deploy-aur:
    name: Deploy to AUR
    needs: publish-release
    runs-on: ubuntu-latest
    container:
      # INFO:  Use Arch image to access updpkgsums
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm pacman-contrib git openssh
      - uses: actions/checkout@v6.0.2
      - name: Update Version in PKGBUILD
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V=${VERSION#v}
          sed -i "s/pkgver=.*/pkgver=$VERSION_NO_V/" ./scripts/PKGBUILD
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: kuba-bin
          pkgbuild: ./scripts/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ env.CLEAN_VERSION }}"
          updpkgsums: true
